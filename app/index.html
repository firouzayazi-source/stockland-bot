<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, user-scalable=no">
  <title>استوک‌لند</title>
  <meta name="theme-color" content="#f2f2f7" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="استوک‌لند">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="vendor/framework7-bundle-rtl.min.css">
  <link rel="stylesheet" href="app.css">
  <script src="https://telegram.org/js/telegram-web-app.js" onerror="void(0)"></script>
</head>
<body>
  <div id="app">
    <div class="view view-main view-init safe-areas">
      <div class="page page-with-navbar-large" data-name="home">

        <!-- ناوبار بزرگ iOS -->
        <div class="navbar navbar-large navbar-transparent">
          <div class="navbar-bg"></div>
          <div class="navbar-inner">
            <div class="title">استوک‌لند</div>
            <div class="title-large">
              <div class="title-large-text">استوک‌لند</div>
            </div>
          </div>
        </div>

        <!-- تب‌بار پایین -->
        <div class="toolbar toolbar-bottom tabbar tabbar-icons">
          <div class="toolbar-inner">
            <a href="#tab-tutorial" class="tab-link tab-link-active">
              <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg></span>
              <span class="tabbar-label">آموزش</span>
            </a>
            <a href="#tab-news" class="tab-link">
              <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 1-4 0V6"/><path d="M18 14h-8"/><path d="M15 18h-5"/><path d="M10 6h8v4h-8z"/></svg></span>
              <span class="tabbar-label">اخبار</span>
            </a>
            <a href="#tab-feature" class="tab-link">
              <span class="icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.6L19.5 10l-5.6 1.9L12 17.5l-1.9-5.6L4.5 10l5.6-1.4z"/><path d="M19 15l.8 2.2L22 18l-2.2.8L19 21l-.8-2.2L16 18l2.2-.8z"/></svg></span>
              <span class="tabbar-label">امکانات</span>
            </a>
          </div>
        </div>

        <div class="tabs">
          <div id="tab-tutorial" class="page-content tab tab-active" data-kind="tutorial">
            <div class="sl-list"></div>
          </div>
          <div id="tab-news" class="page-content tab" data-kind="news">
            <div class="sl-list"></div>
          </div>
          <div id="tab-feature" class="page-content tab" data-kind="feature">
            <div class="sl-list"></div>
          </div>
        </div>

        <!-- بنر راهنمای نصب (فقط در مرورگر) -->
        <div id="install-hint" class="sl-install-hint" style="display:none">
          <div class="sl-install-text">
            <b>نصب اپ روی گوشی</b>
            <span id="install-hint-text">از منوی Share گزینه Add to Home Screen را بزنید</span>
          </div>
          <button id="install-btn" class="sl-install-btn" style="display:none">نصب</button>
          <button id="install-close" class="sl-install-close">✕</button>
        </div>

      </div>
    </div>

    <!-- پاپ‌آپ جزئیات پست -->
    <div class="popup" id="post-popup">
      <div class="view view-init">
        <div class="page">
          <div class="navbar">
            <div class="navbar-bg"></div>
            <div class="navbar-inner">
              <div class="title" id="post-title">​</div>
              <div class="right">
                <a href="#" class="link popup-close">بستن</a>
              </div>
            </div>
          </div>
          <div class="page-content">
            <div id="post-body" class="sl-post-body"></div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="vendor/framework7-bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
