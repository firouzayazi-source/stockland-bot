<!doctype html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <meta name="description" content="StockLand Mini App" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="icon" href="./icons/icon-192.png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <title>StockLand Mini App</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <header class="topbar">
    <h1>StockLand</h1>
    <button id="installBtn" class="btn ghost" hidden>نصب اپ</button>
  </header>

  <main class="container">
    <section class="card">
      <h2>جستجوی نماد</h2>
      <form id="searchForm" class="row" autocomplete="on">
        <input
          id="symbolInput"
          name="symbol"
          type="text"
          inputmode="search"
          placeholder="مثلاً: فولاد"
          required
        />
        <button class="btn" type="submit">جستجو</button>
      </form>
      <p id="status" class="status" aria-live="polite"></p>
    </section>

    <section class="card">
      <h2>نتیجه</h2>
      <div id="result" class="result empty">هنوز داده‌ای دریافت نشده.</div>
    </section>
  </main>

  <footer class="footer">
    <small>© StockLand</small>
  </footer>

  <script src="./app.js" defer></script>
</body>
</html>
